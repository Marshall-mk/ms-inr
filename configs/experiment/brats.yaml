# BraTS simulated SRR benchmark. Stacks are generated by scripts/simulate_batch.py
# into each data/brats/<ID>/ dir. Start with a few subjects to validate; add more
# by listing them here (or regenerate from data/brats/subjects.txt).
results_dir: results/brats
env: dev

methods:
  - name: inr_muon
    run: methods/inr_muon/run.py
    config: configs/default.yaml
    set: {}
  - name: inr_adam
    run: methods/inr_adam/run.py
    config: configs/default.yaml
    set: {}
  - name: classical_srr
    run: methods/classical_srr/run.py
    set: {reg_lambda: 0.1, cg_maxiter: 200}
  - name: nesvor
    run: methods/nesvor/run.py
    set: {output_resolution: 1.0}

subjects:
  - {name: BraTS2021_00000, stacks: data/brats/BraTS2021_00000, gt: data/brats/BraTS2021_00000/gt.nii.gz}
  - {name: BraTS2021_00002, stacks: data/brats/BraTS2021_00002, gt: data/brats/BraTS2021_00002/gt.nii.gz}
  - {name: BraTS2021_00003, stacks: data/brats/BraTS2021_00003, gt: data/brats/BraTS2021_00003/gt.nii.gz}
